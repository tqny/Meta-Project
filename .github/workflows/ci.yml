name: ci

on:
  pull_request:
  workflow_dispatch:

jobs:
  evidence-check:
    name: evidence-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run evidence check
        run: bash scripts/check-evidence.sh

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Syntax and import checks
        run: PYTHONPYCACHEPREFIX=/tmp/pycache python3 -m compileall -q src tests scripts

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v
      - name: Build Product V1 payload
        run: python3 scripts/build-product-v1.py --output /tmp/product-v1.json
      - name: Render weekly run report (dry run)
        run: python3 scripts/report-runs.py --dry-run
      - name: Render threshold tuning report (dry run)
        run: python3 scripts/tune-thresholds.py --sample-size 30 --seed-count 2 --threshold-min 0.60 --threshold-max 0.80 --threshold-step 0.10 --dry-run
