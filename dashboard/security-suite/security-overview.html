<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brand Protection Control Center — Operations Overview</title>
    <link rel="stylesheet" href="../../design-system/saas-security-neon/tokens.css" />
    <link rel="stylesheet" href="./assets/security-suite.css" />
  </head>
  <body class="theme-saas-security-neon" data-page="overview">
    <div class="ss-page">
      <div class="ss-shell">
        <aside class="ss-rail">
          <button class="ss-logo" type="button" data-brand-trigger aria-label="About Speculo">S</button>
          <nav class="ss-rail-nav" aria-label="Brand Protection Control Center pages">
            <a class="ss-icon-link is-active" href="./security-overview.html" aria-label="Operations Overview"><span class="ss-icon-letter">1</span><span class="ss-icon-text">Overview</span></a>
            <a class="ss-icon-link" href="./table.html" aria-label="Case Queue"><span class="ss-icon-letter">2</span><span class="ss-icon-text">Queue</span></a>
            <a class="ss-icon-link" href="./charts.html" aria-label="Case Investigation"><span class="ss-icon-letter">3</span><span class="ss-icon-text">Investigate</span></a>
            <a class="ss-icon-link" href="./heatmap.html" aria-label="Domain Portfolio"><span class="ss-icon-letter">4</span><span class="ss-icon-text">Domains</span></a>
            <a class="ss-icon-link" href="./ui-elements.html" aria-label="Enforcement and Vendor Tracker"><span class="ss-icon-letter">5</span><span class="ss-icon-text">Enforce</span></a>
          </nav>
        </aside>

        <main class="ss-main">
          <header class="ss-topbar">
            <div class="ss-topbar-row ss-topbar-row-overview-main">
              <div class="ss-topbar-title-block">
                <p class="ss-overview-title-prefix">Program</p>
                <h1 class="ss-page-title">Overview</h1>
              </div>
              <div class="ss-overview-header-actions">
                <button id="overview-page-help" class="ss-icon-btn ss-help-btn" type="button" data-explainer-trigger="overview.page" aria-label="Explain Overview page">?</button>
              </div>
            </div>
          </header>

          <section class="ss-content ss-grid">
            <article class="ss-card ss-overview-hero-card">
              <div class="ss-card-head">
                <div class="ss-card-head-main">
                  <p class="ss-section-kicker">Program Health Surface</p>
                  <div class="ss-card-title-row">
                    <h2 class="ss-card-title">Threat Volume &amp; Response Movement</h2>
                  </div>
                </div>
                <button id="overview-health-help" class="ss-icon-btn ss-help-btn ss-panel-help-btn" type="button" data-explainer-trigger="overview.program_health_surface" aria-label="Explain Program Health Surface">?</button>
              </div>

              <div class="ss-overview-hero-grid">
                <div class="ss-overview-chart-panel">
                  <div class="ss-overview-chart-head">
                    <div class="ss-overview-chart-copy">
                      <p class="ss-field-label">Threat Movement</p>
                    </div>
                    <div class="ss-overview-chart-actions">
                      <div class="ss-chart-legend" role="group" aria-label="Threat movement series">
                        <button class="ss-legend-chip ss-legend-domains" type="button" data-overview-series="domains">Domains Flagged</button>
                        <button class="ss-legend-chip ss-legend-cases" type="button" data-overview-series="cases">Cases Opened</button>
                        <button class="ss-legend-chip ss-legend-closures" type="button" data-overview-series="resolved">Actions Resolved</button>
                      </div>
                      <button id="overview-summary-trigger" class="ss-icon-btn ss-help-btn ss-summary-btn ss-panel-help-btn" type="button" aria-label="Open Program Health summary">★</button>
                      <button id="overview-movement-help" class="ss-icon-btn ss-help-btn ss-panel-help-btn" type="button" data-explainer-trigger="overview.threat_movement" aria-label="Explain Threat Movement">?</button>
                    </div>
                  </div>
                  <div class="ss-overview-chart-body">
                    <div id="overview-chart-stage" class="ss-overview-chart-stage">
                      <svg id="overview-volume-line" class="ss-svg ss-svg-tall" role="img" aria-label="Threat volume and response movement"></svg>
                      <div id="overview-movement-tooltip" class="ss-overview-tooltip" role="status" aria-live="polite" hidden></div>
                    </div>
                    <div id="overview-movement-deltas" class="ss-overview-delta-strip ss-overview-delta-rail" aria-label="Threat movement period deltas"></div>
                  </div>
                  <div class="ss-overview-chart-footer">
                    <div class="ss-controls ss-controls-overview-chart">
                      <button id="overview-range-all" class="ss-pill ss-pill-compact ss-overview-range-pill is-active" type="button" data-overview-range="all">All Activity</button>
                      <button id="overview-range-week" class="ss-pill ss-pill-compact ss-overview-range-pill" type="button" data-overview-range="week">Last 7 Days</button>
                    </div>
                  </div>
                </div>
              </div>
            </article>

            <div class="ss-support-grid ss-support-grid-overview">
              <aside class="ss-overview-briefing">
                <div class="ss-overview-briefing-card">
                  <div class="ss-card-title-row ss-card-title-row-help">
                    <h2 class="ss-card-title">Executive Briefing</h2>
                    <button id="overview-briefing-help" class="ss-icon-btn ss-help-btn ss-panel-help-btn" type="button" data-explainer-trigger="overview.executive_briefing" aria-label="Explain Executive Briefing">?</button>
                  </div>
                  <ul id="overview-watchlist" class="ss-list"></ul>
                </div>
              </aside>

              <article class="ss-card">
                <div class="ss-card-title-row">
                  <h2 class="ss-card-title">Threats by Channel</h2>
                  <p class="ss-subtle">Cross-channel distribution in scope</p>
                </div>
                <div id="overview-channel-bars" class="ss-bar-list"></div>
              </article>

              <article class="ss-card">
                <div class="ss-card-title-row">
                  <h2 class="ss-card-title">Threats by Type</h2>
                  <p class="ss-subtle">Dominant abuse patterns</p>
                </div>
                <div id="overview-type-bars" class="ss-bar-list"></div>
              </article>
            </div>
          </section>
        </main>
      </div>
    </div>

    <div id="ss-tooltip" class="ss-tooltip ss-hidden" role="status" aria-live="polite"></div>
    <script type="module" src="./assets/security-suite.js"></script>
  </body>
</html>
